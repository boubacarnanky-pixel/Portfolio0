<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baterrie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background-color: #2e2e2e;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .battery-top {
            width: 30px;
            height: 10px;
            background-color: black;
            margin: 0 auto;
            border: 3px solid silver;
            border-top-right-radius: 8px;
            border-top-left-radius: 8px;
        }

        .battery-content {
            width: 150px;
            height: 250px;
            background-color: black;
            margin: 0 auto;
            border: 3px solid silver;
            border-radius: 18px;
            position: relative;
        }

        .charge {
            width: 100%;
            position: absolute;
            bottom: 0;
            border-radius: 14px;
            animation: battery 8s linear infinite;
        }

        @keyframes battery {
            0% {
                height: 0%;
                background-color: red;
            }

            25% {
                height: 25%;
                background-color: orange;
            }

            50% {
                height: 50%;
                background-color: yellow;
            }

            75% {
                height: 75%;
                background-color: #d7fc03;
            }

            100% {
                height: 100%;
                background-color: rgb(0, 255, 0);
            }
        }
    </style>
</head>

<body>

            <div class="main">
                <div class="battery-top"></div>
                <div class="battery-content">
                    <div class="charge"></div>
                </div>
            </div>
        </section>
    </main>
</body>
