<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apprndre les bouton et lien de navigation</title>
</head>
<style>
    * {
        margin: 20px;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #F0F0F3;
        flex-wrap: wrap;
    }

    .boite1 {
        height: 200px;
        width: 200px;
        border-radius: 20px;
        background-color: #F0F0F3;
        box-shadow: -7px -7px 20px 2px #FFFFFF, 15px 15px 20px 0px #AEAEC0;
    }

    .boite2 {
        height: 200px;
        width: 200px;
        border-radius: 20px;
        background-color: #F0F0F3;
        box-shadow: inset -11px -11px 10px 0px #AEAEC0, inset -15px -15px 30px 20px #FFFFFF;
    }

    .boite3 {
        height: 200px;
        width: 200px;
        border-radius: 20px;
        background-color: #F0F0F3;
        box-shadow: -15px -15px 30px 0px #AEAEC0, inset 7px 7px 11px 0px #AEAEC0,
            3px 3px 30px 0px #FFFFFF, inset -20px -20px 30px 0px #FFFFFF;
    }

    .boite4 {
        height: 200px;
        width: 200px;
        border-radius: 100px;
        background-color: #F0F0F3;
        box-shadow: -11px -11px 10px 0px #AEAEC0, -15px -15px 30px 20px #FFFFFF,
            inset -7px -7px 20px 2px #FFFFFF, inset 15px 15px 20px 0px #AEAEC0;
    }
</style>

<body>
    <header>
        <div class="logo-name">
            <h2></h2>
        </div>
        <!--Ici y'aura qu'un bouton next pour les autre projet d'animation-->

            <li><a href="Baterrie.html" target="_blank" rel="noopener noreferrer">baterrie</a></li>
            <li><a href="grid-card.html" target="_blank" rel="noopener noreferrer">grid-card</a></li>
            <li><a href="bouton.html" target="_blank" rel="noopener noreferrer">bouton</a></li>
        </ul>
    </header>
    <section class="portfolio">
        <div class="boite1"></div>
        <div class="boite2"></div>
        <div class="boite3"></div>
        <div class="boite4">

    </section>
</body>

</html>
